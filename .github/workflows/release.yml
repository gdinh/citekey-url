name: Release XPI

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release XPI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag matches manifest version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(jq -r '.version' manifest.json)"

          if [ "$tag" != "$version" ]; then
            echo "Tag '$GITHUB_REF_NAME' does not match manifest version '$version'."
            exit 1
          fi

      - name: Build XPI
        shell: bash
        run: |
          mkdir -p dist
          zip -r dist/citekey-url.xpi manifest.json bootstrap.js
          sha256sum dist/citekey-url.xpi > dist/citekey-url.xpi.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="$GITHUB_REF_NAME"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/citekey-url.xpi dist/citekey-url.xpi.sha256 --clobber
          else
            gh release create "$tag" \
              dist/citekey-url.xpi \
              dist/citekey-url.xpi.sha256 \
              --title "$tag" \
              --generate-notes
          fi
